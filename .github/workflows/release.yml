name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::8}"
          LDFLAGS="-X github.com/ArdaGnsrn/opsvault/internal/buildinfo.Version=${VERSION} \
                   -X github.com/ArdaGnsrn/opsvault/internal/buildinfo.Commit=${COMMIT} \
                   -w -s"

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/opsvault-linux-amd64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/opsvault-linux-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/opsvault-linux-amd64
            dist/opsvault-linux-arm64
          generate_release_notes: true
