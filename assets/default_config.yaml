# OpsVault Configuration File
# Generated by: opsvault config init

version: 1

# Directory where backup files are stored locally before upload
backup_dir: /var/backups/opsvault

# Backup schedule in standard 5-field cron notation
# Examples:
#   "0 2 * * *"     - every day at 02:00
#   "0 */6 * * *"   - every 6 hours
#   "30 3 * * 0"    - every Sunday at 03:30
schedule: "0 2 * * *"

# Logging
log_level: info    # debug | info | warn | error
log_format: json   # json | text

# Database connections to back up
databases:
  - name: myapp_prod        # Logical name used in filenames and notifications
    type: mysql             # mysql | postgres
    host: 127.0.0.1
    port: 3306
    user: backup_user
    password: ""            # Plain text password (not recommended for production)
    password_env: DB_PASS   # Read password from this environment variable (preferred)
    database: myapp         # The specific database to dump
    extra_opts: ""          # Additional options passed verbatim to mysqldump / pg_dump
    enabled: true

  # - name: analytics_pg
  #   type: postgres
  #   host: 127.0.0.1
  #   port: 5432
  #   user: backup_user
  #   password_env: PG_BACKUP_PASS
  #   database: analytics
  #   extra_opts: "--no-owner"
  #   enabled: true

# Remote storage via rclone (rclone must be installed and configured separately)
storage:
  rclone:
    enabled: false
    remote: "s3backup"                              # Name of the rclone remote
    path: "opsvault/{hostname}/{name}/{date}"       # Path template on the remote
    rclone_config: ""                               # Custom rclone.conf path (empty = default)
    extra_args: ""                                  # Extra args passed to `rclone copy`
    delete_after_upload: false                      # Remove local file after successful upload

# Backup retention policy
retention:
  local:
    enabled: true
    keep_last: 7      # Keep the N most recent backups per database (0 = disabled)
    keep_days: 0      # Delete backups older than N days (0 = disabled)
  remote:
    enabled: false
    keep_last: 0      # Keep the N most recent remote backups per database (0 = disabled)
    keep_days: 30     # Delete remote backups older than N days via rclone --min-age (0 = disabled)

# Notifications
notifications:
  on_success: true    # Send notification on successful backup
  on_failure: true    # Send notification on backup failure

  telegram:
    enabled: false
    bot_token: ""             # Bot token from @BotFather
    bot_token_env: "TELEGRAM_TOKEN"  # Read token from env var instead
    chat_id: ""               # User or group chat ID

  email:
    enabled: false
    smtp_host: smtp.example.com
    smtp_port: 587
    smtp_tls: true            # Use STARTTLS
    from: opsvault@example.com
    to:
      - admin@example.com
    username: opsvault@example.com
    password_env: SMTP_PASS   # Read SMTP password from env var
